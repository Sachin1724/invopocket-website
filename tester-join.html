<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/png" href="favicon.png">
<title>Join as Internal Tester — InvoPocket</title>
<meta name="description" content="Register to become an internal tester for InvoPocket. Access early builds and help us improve.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">

<style>
/* ═══════════════════════════════════════════════
   DESIGN TOKENS (Shared with index.html)
   ═══════════════════════════════════════════════ */
:root {
  --black: #000;
  --white: #fff;
  --g50:  #FAFAFA;
  --g100: #F4F4F5;
  --g200: #E4E4E7;
  --g300: #D4D4D8;
  --g400: #A1A1AA;
  --g500: #71717A;
  --g600: #52525B;
  --g700: #3F3F46;
  --g800: #27272A;
  --g900: #18181B;
  --g950: #09090B;
  --accent: #fff;
  --r-sm: 8px; --r-md: 16px; --r-lg: 24px; --r-xl: 32px;
  --font: 'Inter', system-ui, sans-serif;
  --mono: 'JetBrains Mono', monospace;
  --ease: cubic-bezier(0.22, 1, 0.36, 1);
}

/* RESET & BASE */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: var(--font);
  background: var(--black);
  color: var(--white);
  line-height: 1.6;
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
  display: flex;
  flex-direction: column;
  min-height: 100vh;
}
a { text-decoration: none; color: inherit; }

/* NAV */
nav {
  position: fixed; top: 0; left: 0; right: 0; z-index: 999;
  height: 64px;
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 40px;
  background: rgba(0,0,0,0.8);
  backdrop-filter: blur(20px);
  border-bottom: 1px solid rgba(255,255,255,0.06);
}
.nav-brand { display: flex; align-items: center; gap: 10px; }
.nav-logo { width: 34px; height: 34px; border-radius: 9px; object-fit: contain; }
.nav-name { font-size: 16px; font-weight: 800; letter-spacing: -0.4px; }
.nav-name span { color: var(--g500); }
.nav-links { display: flex; gap: 28px; }
.nav-links a { font-size: 13px; font-weight: 500; color: var(--g400); transition: color 0.2s; }
.nav-links a:hover { color: var(--white); }
.nav-dl {
  background: var(--white); color: var(--black);
  padding: 8px 18px; border-radius: var(--r-sm);
  font-size: 13px; font-weight: 700;
  transition: all 0.2s var(--ease);
}
.nav-dl:hover { transform: translateY(-1px); box-shadow: 0 8px 24px rgba(255,255,255,0.15); }

/* CONTENT WRAPPER */
.main-content {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 100px 24px 60px;
  position: relative;
  overflow: hidden;
}
/* grid background */
.main-content::before {
  content: '';
  position: absolute; inset: 0;
  background-image:
    linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
  background-size: 60px 60px;
  mask-image: radial-gradient(circle at 50% 50%, black 40%, transparent 100%);
  pointer-events: none;
  z-index: 0;
}

/* FORM CARD */
.signup-card {
  background: var(--g950);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: var(--r-lg);
  padding: 40px;
  width: 100%;
  max-width: 480px;
  position: relative;
  z-index: 1;
  box-shadow: 0 20px 40px rgba(0,0,0,0.6);
}

.signup-header {
  text-align: center;
  margin-bottom: 32px;
}
.signup-title {
  font-size: 28px;
  font-weight: 800;
  letter-spacing: -1px;
  margin-bottom: 8px;
}
.signup-subtitle {
  font-size: 14px;
  color: var(--g500);
}

/* FORM ELEMENTS */
.form-group {
  margin-bottom: 20px;
}
.form-label {
  display: block;
  font-size: 12px;
  font-weight: 600;
  color: var(--g400);
  margin-bottom: 8px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}
.form-input {
  width: 100%;
  background: var(--g900);
  border: 1px solid var(--g800);
  border-radius: var(--r-sm);
  padding: 12px 16px;
  font-size: 14px;
  color: var(--white);
  font-family: var(--font);
  transition: border-color 0.2s var(--ease), box-shadow 0.2s var(--ease);
}
.form-input:focus {
  outline: none;
  border-color: rgba(255,255,255,0.3);
  box-shadow: 0 0 0 2px rgba(255,255,255,0.05);
}

/* SUBMIT BUTTON */
.btn-submit {
  width: 100%;
  background: var(--white);
  color: var(--black);
  border: none;
  border-radius: var(--r-sm);
  padding: 14px;
  font-size: 14px;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.25s var(--ease);
  margin-top: 10px;
}
.btn-submit:hover {
  transform: translateY(-2px);
  box-shadow: 0 8px 24px rgba(255,255,255,0.25);
}

/* FOOTER */
footer {
  background: var(--g950);
  border-top: 1px solid rgba(255,255,255,0.06);
  padding: 24px;
  text-align: center;
  font-size: 12px;
  color: var(--g700);
  position: relative;
  z-index: 1;
}

@media(max-width: 768px) {
  nav { padding: 0 20px; }
  .nav-links { display: none; }
  .nav-dl { display: none; }
  .signup-card { padding: 24px; }
}
</style>
</head>
<body>

<!-- ═══ NAV ═══ -->
<nav>
  <div class="nav-brand">
    <img class="nav-logo" src="logo.png" alt="InvoPocket Logo">
    <span class="nav-name">Invo<span>Pocket</span></span>
  </div>
  <div class="nav-links">
    <a href="index.html#features">Features</a>
    <a href="index.html#manage">How it works</a>
    <a href="index.html#encryption">Security</a>
    <a href="index.html#install">Install</a>
    <a href="help.html">Help Center</a>
    <a href="privacy.html">Privacy</a>
    <a href="delete-account.html">Delete Account</a>
    <a href="developer.html">Developer</a>
  </div>
  <a href="app-release.apk" class="nav-dl" download>Download APK</a>
</nav>

<!-- ═══ MAIN CONTENT ═══ -->
<div class="main-content">
  <div class="signup-card">
    <div class="signup-header">
      <h1 class="signup-title">Join Internal Testing</h1>
      <p class="signup-subtitle">Enter your details to receive an invitation to test InvoPocket on Android.</p>
    </div>

    <!-- Netlify-enabled Form -->
    <form name="tester-signup" method="POST" action="/tester-success.html" data-netlify="true">
      <div class="form-group">
        <label for="name" class="form-label">Full Name</label>
        <input type="text" id="name" name="name" class="form-input" placeholder="John Doe" required>
      </div>

      <div class="form-group">
        <label for="email" class="form-label">Email Address (Google Account)</label>
        <input type="email" id="email" name="email" class="form-input" placeholder="johndoe@gmail.com" required>
      </div>

      <button type="submit" class="btn-submit">Submit Request</button>
    </form>
  </div>
</div>

<!-- ═══ FOOTER ═══ -->
<footer>
  <p>&copy; 2026 InvoPocket. Securely created for internal testing.</p>
</footer>

</body>
</html>
